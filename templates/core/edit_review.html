<!-- templates/core/edit_review.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Your Review</h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h5>{{ product.name }}</h5>
                        <p class="text-muted">Original review: {{ review.created_at|date:"d M Y" }}</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Your Rating *</label>
                            <div class="rating-stars mb-3">
                                {% for value, label in form.rating.field.choices %}
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" 
                                           name="rating" id="rating{{ value }}" 
                                           value="{{ value }}" 
                                           {% if form.rating.value == value|stringformat:"i" %}checked{% endif %}>
                                    <label class="form-check-label" for="rating{{ value }}">
                                        <div class="stars">
                                            {% for i in "12345"|make_list %}
                                                {% if i <= value|stringformat:"i" %}
                                                    <i class="fas fa-star text-warning"></i>
                                                {% else %}
                                                    <i class="far fa-star text-warning"></i>
                                                {% endif %}
                                            {% endfor %}
                                            <span class="ms-2">{{ label }}</span>
                                        </div>
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Your Review *</label>
                            {{ form.comment }}
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'core:product_detail' product.id %}" class="btn btn-outline-secondary">
                                <i class="fas fa-times me-1"></i> Cancel
                            </a>
                            <div>
                                <a href="{% url 'core:delete_review' review.id %}" class="btn btn-outline-danger me-2">
                                    <i class="fas fa-trash me-1"></i> Delete
                                </a>
                                <button type="submit" class="btn btn-warning">
                                    <i class="fas fa-save me-1"></i> Update Review
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .rating-stars .form-check-input {
        display: none;
    }
    .rating-stars .form-check-label {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 5px;
        transition: all 0.3s;
    }
    .rating-stars .form-check-input:checked + .form-check-label {
        background-color: #fff3cd;
        border: 1px solid #ffc107;
    }
    .stars {
        font-size: 1.2rem;
    }
</style>
{% endblock %}
