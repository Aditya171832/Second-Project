<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Registration - AgriGrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome-6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .registration-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-success {
            background-color: #2e8b57;
            border-color: #2e8b57;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card registration-card">
                    <div class="card-header bg-success text-white text-center py-4">
                        <h2><i class="fas fa-store me-2"></i>Dealer Registration</h2>
                        <p class="mb-0">Join AgriGrow as a fertilizer dealer</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="post">
                            {% csrf_token %}
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Username *</label>
                                    <input type="text" name="username" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email *</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name *</label>
                                    <input type="text" name="first_name" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name *</label>
                                    <input type="text" name="last_name" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Password *</label>
                                    <input type="password" name="password1" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Confirm Password *</label>
                                    <input type="password" name="password2" class="form-control" required>
                                </div>
                            </div>
                            
                            <hr>
                            <h5 class="text-success mb-3">Business Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Company Name *</label>
                                <input type="text" name="company_name" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">GST Number *</label>
                                <input type="text" name="gst_number" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Business Address *</label>
                                <textarea name="business_address" class="form-control" rows="3" required></textarea>
                            </div>
                            
                            <hr>
                            <h5 class="text-success mb-3">Contact Information</h5>
                            
                            <div class="mb-3">
                                <label class="form-label">Phone *</label>
                                <input type="text" name="phone" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Address *</label>
                                <textarea name="address" class="form-control" rows="3" required></textarea>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">City *</label>
                                    <input type="text" name="city" class="form-control" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">State *</label>
                                    <input type="text" name="state" class="form-control" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">Pincode *</label>
                                    <input type="text" name="pincode" class="form-control" required>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg py-3">
                                    <i class="fas fa-store me-2"></i>Register as Dealer
                                </button>
                                <a href="/login/" class="btn btn-outline-secondary">
                                    Already have an account? Login here
                                </a>
                                <a href="/" class="btn btn-link">
                                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    
    form.addEventListener('submit', function(event) {
        let isValid = true;
        
        // Password validation
        const password1 = document.querySelector('input[name="password1"]');
        const password2 = document.querySelector('input[name="password2"]');
        
        if (password1.value.length < 8) {
            alert('Password must be at least 8 characters long');
            isValid = false;
        }
        
        if (password1.value !== password2.value) {
            alert('Passwords do not match');
            isValid = false;
        }
        
        // Phone validation
        const phone = document.querySelector('input[name="phone"]');
        const phoneRegex = /^[6-9]\d{9}$/;
        if (!phoneRegex.test(phone.value)) {
            alert('Enter valid 10-digit Indian phone number starting with 6-9');
            isValid = false;
        }
        
        // GST validation
        const gst = document.querySelector('input[name="gst_number"]');
        const gstRegex = /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$/;
        if (!gstRegex.test(gst.value)) {
            alert('Enter valid 15-character GST number');
            isValid = false;
        }
        
        // Pincode validation
        const pincode = document.querySelector('input[name="pincode"]');
        const pincodeRegex = /^\d{6}$/;
        if (!pincodeRegex.test(pincode.value)) {
            alert('Enter valid 6-digit pincode');
            isValid = false;
        }
        
        if (!isValid) {
            event.preventDefault();
        }
    });
});
</script>
</body>
</html>
