<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Dashboard - AgriGrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome-6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-success { background-color: #2e8b57; border-color: #2e8b57; }
        .sidebar { background-color: #fff; min-height: 100vh; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-0">
                <div class="p-4 text-center">
                    <i class="fas fa-store fa-3x text-success mb-3"></i>
                    <h5>Dealer Dashboard</h5>
                    <p class="text-muted">Welcome, {{ user.username }}</p>
                    <small class="text-muted">{{ user.profile.company_name }}</small>
                </div>
                <nav class="nav flex-column p-3">
                    <a class="nav-link active text-success" href="#">
                        <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                    </a>
                    <a class="nav-link text-dark" href="#">
                        <i class="fas fa-box me-2"></i>Products
                    </a>
                    <a class="nav-link text-dark" href="#">
                        <i class="fas fa-shopping-cart me-2"></i>Orders
                    </a>
                    <a class="nav-link text-dark" href="/logout/">
                        <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 ml-sm-auto px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 text-success">Dealer Dashboard</h1>
                    <a href="/" class="btn btn-outline-success">
                        <i class="fas fa-home me-1"></i>Back to Home
                    </a>
                </div>

                <!-- Stats Cards -->
                <div class="row mb-4">
                    <div class="col-md-3 mb-3">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <i class="fas fa-box fa-2x text-success mb-2"></i>
                                <h4>12</h4>
                                <p class="text-muted">Products</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <i class="fas fa-shopping-cart fa-2x text-info mb-2"></i>
                                <h4>5</h4>
                                <p class="text-muted">Orders Today</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <i class="fas fa-rupee-sign fa-2x text-warning mb-2"></i>
                                <h4>₹24,500</h4>
                                <p class="text-muted">Revenue</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card dashboard-card text-center">
                            <div class="card-body">
                                <i class="fas fa-users fa-2x text-primary mb-2"></i>
                                <h4>28</h4>
                                <p class="text-muted">Customers</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="card dashboard-card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="fas fa-bolt me-2"></i>Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3 mb-3">
                                <a href="#" class="btn btn-outline-success w-100 py-3">
                                    <i class="fas fa-plus-circle me-2"></i>Add Product
                                </a>
                            </div>
                            <div class="col-md-3 mb-3">
                                <a href="#" class="btn btn-outline-info w-100 py-3">
                                    <i class="fas fa-edit me-2"></i>Manage Inventory
                                </a>
                            </div>
                            <div class="col-md-3 mb-3">
                                <a href="#" class="btn btn-outline-warning w-100 py-3">
                                    <i class="fas fa-shipping-fast me-2"></i>Process Orders
                                </a>
                            </div>
                            <div class="col-md-3 mb-3">
                                <a href="#" class="btn btn-outline-primary w-100 py-3">
                                    <i class="fas fa-chart-bar me-2"></i>View Reports
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
